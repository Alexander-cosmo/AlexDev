<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armá tu PC - VOLTEK</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">VOLT<span>EK</span></a></div>
    <div class="navbar-acciones">
      <a href="index.html" class="btn-login">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Volver al catálogo</span>
      </a>
    </div>
  </nav>

  <main class="armador">
    <div class="armador-header">
      <span class="seccion-tag">Armador de PC</span>
      <h1 class="seccion-titulo">Armá tu PC a medida</h1>
      <p class="seccion-subtitulo">Elegí cada componente y comprobamos la compatibilidad por vos</p>
    </div>

    <div class="armador-layout">

      <!-- Columna izquierda: diagrama visual -->
      <div class="armador-visual">
        <svg viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg" class="gabinete-svg">
          <!-- Carcasa del gabinete -->
          <rect x="10" y="10" width="280" height="400" rx="12" fill="none" stroke="var(--ink)" stroke-width="3"/>

          <!-- Zona motherboard: placa con agujeros de montaje y pistas de circuito -->
          <g id="zonaMother" class="zona-grupo">
            <rect class="zona-base" x="30" y="30" width="240" height="150" rx="6"/>
            <circle class="zona-detalle" cx="38" cy="38" r="3"/>
            <circle class="zona-detalle" cx="262" cy="38" r="3"/>
            <circle class="zona-detalle" cx="38" cy="172" r="3"/>
            <circle class="zona-detalle" cx="262" cy="172" r="3"/>
            <path class="zona-traza" d="M 115 160 L 115 175 L 200 175" fill="none"/>
            <path class="zona-traza" d="M 200 130 L 260 130" fill="none"/>
          </g>
          <text x="150" y="20" class="zona-label" text-anchor="middle">MOTHERBOARD</text>

          <!-- Zona CPU: chip cuadrado con pines alrededor -->
          <g id="zonaCpu" class="zona-grupo">
            <rect class="zona-base" x="50" y="50" width="60" height="60" rx="3"/>
            <rect class="zona-nucleo" x="62" y="62" width="36" height="36" rx="2"/>
            <!-- pines arriba y abajo -->
            <line class="zona-pin" x1="58" y1="47" x2="58" y2="50"/>
            <line class="zona-pin" x1="68" y1="47" x2="68" y2="50"/>
            <line class="zona-pin" x1="78" y1="47" x2="78" y2="50"/>
            <line class="zona-pin" x1="88" y1="47" x2="88" y2="50"/>
            <line class="zona-pin" x1="98" y1="47" x2="98" y2="50"/>
            <line class="zona-pin" x1="58" y1="110" x2="58" y2="113"/>
            <line class="zona-pin" x1="68" y1="110" x2="68" y2="113"/>
            <line class="zona-pin" x1="78" y1="110" x2="78" y2="113"/>
            <line class="zona-pin" x1="88" y1="110" x2="88" y2="113"/>
            <line class="zona-pin" x1="98" y1="110" x2="98" y2="113"/>
          </g>

          <!-- Zona RAM: 2 módulos con muesca típica y contactos dorados -->
          <g id="zonaRam" class="zona-grupo">
            <path class="zona-base" d="M 130 50 L 145 50 L 145 150 L 137 150 L 137 155 L 130 155 Z"/>
            <line class="zona-pin" x1="132" y1="150" x2="132" y2="155"/>
            <line class="zona-pin" x1="135" y1="150" x2="135" y2="155"/>
            <line class="zona-pin" x1="140" y1="150" x2="140" y2="155"/>
            <line class="zona-pin" x1="143" y1="150" x2="143" y2="155"/>
          </g>
          <g id="zonaRam2" class="zona-grupo">
            <path class="zona-base" d="M 150 50 L 165 50 L 165 150 L 157 150 L 157 155 L 150 155 Z"/>
            <line class="zona-pin" x1="152" y1="150" x2="152" y2="155"/>
            <line class="zona-pin" x1="155" y1="150" x2="155" y2="155"/>
            <line class="zona-pin" x1="160" y1="150" x2="160" y2="155"/>
            <line class="zona-pin" x1="163" y1="150" x2="163" y2="155"/>
          </g>

          <!-- Zona GPU: placa alargada con 2 coolers y el conector PCIe -->
          <g id="zonaGpu" class="zona-grupo">
            <rect class="zona-base" x="30" y="200" width="240" height="50" rx="6"/>
            <circle class="zona-nucleo" cx="80" cy="225" r="16"/>
            <circle class="zona-nucleo" cx="140" cy="225" r="16"/>
            <path class="zona-pin" d="M 80 213 L 80 237 M 68 225 L 92 225 M 71 216 L 89 234 M 89 216 L 71 234" fill="none"/>
            <path class="zona-pin" d="M 140 213 L 140 237 M 128 225 L 152 225 M 131 216 L 149 234 M 149 216 L 131 234" fill="none"/>
            <rect class="zona-detalle" x="185" y="212" width="70" height="26" rx="2"/>
            <rect class="zona-fondo" x="264" y="216" width="8" height="18" rx="1"/>
          </g>
          <text x="150" y="195" class="zona-label" text-anchor="middle">PLACA DE VIDEO</text>

          <!-- Zona almacenamiento: SSD M.2 alargado -->
          <g id="zonaAlmacenamiento" class="zona-grupo">
            <rect class="zona-base" x="30" y="270" width="115" height="40" rx="6"/>
            <rect class="zona-detalle" x="42" y="282" width="45" height="16" rx="2"/>
            <circle class="zona-pin-punto" cx="130" cy="278" r="2.5"/>
          </g>
          <text x="87" y="265" class="zona-label" text-anchor="middle">ALMACENAMIENTO</text>

          <!-- Zona fuente: cubo con rejilla circular de ventilador -->
          <g id="zonaFuente" class="zona-grupo">
            <rect class="zona-base" x="155" y="270" width="115" height="40" rx="6"/>
            <circle class="zona-nucleo" cx="212" cy="290" r="14"/>
            <circle class="zona-fondo" cx="212" cy="290" r="9"/>
            <path class="zona-pin" d="M 212 281 L 212 299 M 203 290 L 221 290 M 205 283 L 219 297 M 219 283 L 205 297" fill="none"/>
          </g>
          <text x="212" y="265" class="zona-label" text-anchor="middle">FUENTE</text>
        </svg>

        <div class="armador-precio-flotante">
          <span>Total</span>
          <strong id="armadorTotal">$0</strong>
        </div>
      </div>

      <!-- Columna derecha: selectores -->
      <div class="armador-panel">

        <div class="selector-componente">
          <label>Procesador (CPU)</label>
          <select id="selectCpu" class="select-componente" data-categoria="cpu">
            <option value="">Elegir procesador...</option>
          </select>
        </div>

        <div class="selector-componente">
          <label>Motherboard</label>
          <select id="selectMother" class="select-componente" data-categoria="mother">
            <option value="">Elegir motherboard...</option>
          </select>
          <p class="alerta-compatibilidad" id="alertaSocket"></p>
        </div>

        <div class="selector-componente">
          <label>Memoria RAM</label>
          <select id="selectRam" class="select-componente" data-categoria="ram">
            <option value="">Elegir memoria...</option>
          </select>
        </div>

        <div class="selector-componente">
          <label>Placa de video (GPU)</label>
          <select id="selectGpu" class="select-componente" data-categoria="gpu">
            <option value="">Elegir placa de video...</option>
          </select>
        </div>

        <div class="selector-componente">
          <label>Almacenamiento</label>
          <select id="selectAlmacenamiento" class="select-componente" data-categoria="almacenamiento">
            <option value="">Elegir almacenamiento...</option>
          </select>
        </div>

        <div class="selector-componente">
          <label>Fuente de poder</label>
          <select id="selectFuente" class="select-componente" data-categoria="fuente">
            <option value="">Elegir fuente...</option>
          </select>
          <p class="alerta-compatibilidad" id="alertaPotencia"></p>
        </div>

        <button class="btn-primario btn-armador-agregar" id="btnAgregarArmado" disabled>
          Completá tu armado para continuar
        </button>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-icono">✅</div>
      <h3>¡Armado agregado!</h3>
      <p>Todos los componentes de tu PC se sumaron al carrito.</p>
      <button class="btn-primario" id="modalCerrar">Cerrar</button>
    </div>
  </div>

  <script src="productos.js"></script>
  <script src="armador.js"></script>
</body>
</html>
